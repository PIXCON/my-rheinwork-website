# Local/dev baseURL. Production overrides this in config/production/hugo.toml.
baseURL = "/"
title = "Rheinwork GmbH"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true

disableKinds = ["taxonomy", "term", "RSS"]
enableRobotsTXT = true
# lastmod = Datum des letzten Git-Commits pro Datei (Sitemap + dateModified aktualisieren sich automatisch)
enableGitInfo = true

[markup.goldmark.renderer]
  unsafe = true

# Shared params (inherited by all languages; tagline/description overridden per language)
[params]
  email = "info@rheinwork.com"
  phone = "+49 (0) 157 5159 6276"
  phoneHref = "+4915751596276"
  address = "Haus-Endt-Straße 90, 40593 Düsseldorf"
  # Kontaktformular: same-origin Pages Function (functions/api/contact.js). Leer = nur Frontend-Demo.
  contactEndpoint = "/api/contact"
  # Cloudflare Turnstile Site-Key (oeffentlich). Leer = kein Captcha (nur Honeypot).
  turnstileSiteKey = "0x4AAAAAADlbnnHIdDe0BTQ2"
  # Social-Sharing-Vorschaubild (1200x630), liegt unter static/
  ogImage = "img/og-image.png"
  # Social-Profile (fuer JSON-LD sameAs / Entitaets-Verknuepfung)
  sameAs = ["https://linkedin.com/company/rheinwork-gmbh", "https://www.facebook.com/profile.php?id=61590446206708", "https://www.instagram.com/rheinwork_gmbh", "https://x.com/rheinworkgmbh"]

  # Strukturierte Adresse (fuer LocalBusiness/PostalAddress JSON-LD)
  [params.postalAddress]
    streetAddress = "Haus-Endt-Straße 90"
    postalCode = "40593"
    addressLocality = "Düsseldorf"
    addressCountry = "DE"

[languages]

  [languages.en]
    weight = 1
    languageName = "English"
    languageCode = "en"
    title = "Rheinwork GmbH"
    [languages.en.params]
      tagline = "Software Engineering"
      description = "We build software, apps and websites that move your business forward."
    [[languages.en.menu.main]]
      name = "Services"
      pageRef = "/services"
      weight = 10
    [[languages.en.menu.main]]
      name = "About"
      pageRef = "/about"
      weight = 20
    [[languages.en.menu.main]]
      name = "Blog"
      pageRef = "/blog"
      weight = 30
    [[languages.en.menu.main]]
      name = "Contact"
      pageRef = "/contact"
      weight = 40

  [languages.de]
    weight = 2
    languageName = "Deutsch"
    languageCode = "de"
    title = "Rheinwork GmbH"
    [languages.de.params]
      tagline = "Software Engineering"
      description = "Wir entwickeln Software, Apps und Websites, die Ihr Unternehmen voranbringen."
    [[languages.de.menu.main]]
      name = "Leistungen"
      pageRef = "/services"
      weight = 10
    [[languages.de.menu.main]]
      name = "Über uns"
      pageRef = "/about"
      weight = 20
    [[languages.de.menu.main]]
      name = "Blog"
      pageRef = "/blog"
      weight = 30
    [[languages.de.menu.main]]
      name = "Kontakt"
      pageRef = "/contact"
      weight = 40
