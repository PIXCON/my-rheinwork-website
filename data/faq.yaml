en:
  - q: "What kind of projects do you take on?"
    a: "From high-performance websites (built with Hugo where it fits) to web apps, portals and custom software, all the way to SaaS products, tracking infrastructure and hosting. If it needs to be technically sound, we build it."
  - q: "Who do you work with?"
    a: "Small and mid-sized companies, startups, founders and service providers — wherever a technically clean solution is needed instead of a pretty builder with no substance."
  - q: "How does a project work?"
    a: "You reach out and receive a short questionnaire; based on it we put together a quote with a concise concept. Once approved, we start building. We deliberately favour a clear written assessment over endless calls — a phone call is of course still possible."
  - q: "Which technologies do you use?"
    a: "The right tool for the job — in practice mostly TypeScript, Go, React/Next.js, Hugo, Node.js and Postgres, plus AWS/Vercel, Docker and Google Tag Manager."
  - q: "Do you also handle hosting and maintenance?"
    a: "Yes, on request — including operations, monitoring and hosting on EU servers in Germany."
  - q: "What does a project cost?"
    a: "Every project is individual, so pricing is on request. Via the questionnaire we estimate effort and direction quickly and transparently."

de:
  - q: "Welche Projekte übernehmen Sie?"
    a: "Von der hochperformanten Website (gern als Hugo-Seite) über Web-Apps, Portale und individuelle Software bis zu SaaS-Produkten, Tracking-Infrastruktur und Hosting. Wenn es technisch fundiert sein soll, bauen wir es."
  - q: "Für wen arbeiten Sie?"
    a: "Für kleine und mittelständische Unternehmen, Startups, Gründer und Dienstleister — überall dort, wo eine technisch saubere Lösung gefragt ist statt eines hübschen Baukastens ohne Substanz."
  - q: "Wie läuft ein Projekt ab?"
    a: "Sie schreiben uns und erhalten einen kurzen Fragebogen; auf dessen Basis erstellen wir ein Angebot mit knapper Konzeption. Nach Annahme starten wir die Umsetzung. Wir setzen bewusst auf eine klare schriftliche Einschätzung statt endloser Calls — ein Telefonat ist natürlich trotzdem möglich."
  - q: "Welche Technologien setzen Sie ein?"
    a: "Je nach Aufgabe das passende Werkzeug — in der Praxis vor allem TypeScript, Go, React/Next.js, Hugo, Node.js und Postgres sowie AWS/Vercel, Docker und der Google Tag Manager."
  - q: "Übernehmen Sie auch Hosting und Wartung?"
    a: "Ja, nach Absprache — inklusive Betrieb, Monitoring und Hosting auf EU-Servern in Deutschland."
  - q: "Was kostet ein Projekt?"
    a: "Jedes Projekt ist individuell, daher Preis auf Anfrage. Über den Fragebogen schätzen wir Aufwand und Richtung schnell und transparent ein."
