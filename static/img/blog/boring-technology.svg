<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="Proven technology">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#15110b"/><stop offset="1" stop-color="#0b0b0d"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="2%" r="75%"><stop offset="0" stop-color="#ff7a18" stop-opacity=".20"/><stop offset="55%" stop-color="#ff7a18" stop-opacity="0"/></radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#241a0c"/><stop offset="1" stop-color="#140f0a"/></linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="8"/></filter>
    <style>
      .ring{transform-origin:600px 270px;animation:spin 16s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      .pulse{animation:pulse 3s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
    </style>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <g fill="#ffffff" opacity="0.018">
    <rect x="70" y="-20" width="120" height="540" rx="60"/><rect x="320" y="-20" width="150" height="540" rx="75"/>
    <rect x="600" y="-20" width="120" height="540" rx="60"/><rect x="860" y="-20" width="150" height="540" rx="75"/><rect x="1110" y="-20" width="120" height="540" rx="60"/>
  </g>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- slow orbit ring (longevity) -->
  <g class="ring">
    <circle cx="600" cy="270" r="150" fill="none" stroke="#ff7a18" stroke-opacity=".25" stroke-width="2" stroke-dasharray="3 16"/>
    <circle cx="600" cy="120" r="6" fill="#ff9a3c"/>
  </g>

  <!-- shield -->
  <path d="M600 150 L700 188 V288 C700 342 654 372 600 396 C546 372 500 342 500 288 V188 Z" fill="url(#panel)" stroke="#ff7a18" stroke-opacity=".75" stroke-width="3"/>
  <path d="M600 150 L700 188 V288 C700 342 654 372 600 396 C546 372 500 342 500 288 V188 Z" fill="none" stroke="#ff7a18" stroke-opacity=".22" stroke-width="12" filter="url(#soft)"/>
  <!-- check -->
  <path class="pulse" d="M556 276 l30 30 l58 -70" fill="none" stroke="#ff9a3c" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- base line / foundation -->
  <g stroke="#ffffff" stroke-opacity=".12" stroke-width="3" stroke-linecap="round"><path d="M470 420 h260"/></g>
  <g stroke="#ff7a18" stroke-opacity=".4" stroke-width="3" stroke-linecap="round"><path d="M540 420 h120"/></g>
</svg>
