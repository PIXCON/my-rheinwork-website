<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="Headless commerce: decoupled storefront and backend">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15110b"/>
      <stop offset="1" stop-color="#0b0b0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="2%" r="75%">
      <stop offset="0" stop-color="#ff7a18" stop-opacity=".20"/>
      <stop offset="55%" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="server" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a0c"/>
      <stop offset="1" stop-color="#140f0a"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      .pulse2{animation:pulse 3.2s ease-in-out infinite;animation-delay:1.1s}
      @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="500" fill="url(#bg)"/>
  <!-- faint brand columns -->
  <g fill="#ffffff" opacity="0.018">
    <rect x="70"  y="-20" width="120" height="540" rx="60"/>
    <rect x="320" y="-20" width="150" height="540" rx="75"/>
    <rect x="600" y="-20" width="120" height="540" rx="60"/>
    <rect x="860" y="-20" width="150" height="540" rx="75"/>
    <rect x="1110" y="-20" width="120" height="540" rx="60"/>
  </g>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- API connection path (dashed line between head and backend) -->
  <g fill="none" stroke="#ff7a18" stroke-opacity=".5" stroke-width="2.5" stroke-dasharray="10 8">
    <path id="p0" d="M412 250 H788"/>
  </g>
  <g fill="#ff9a3c">
    <circle r="5"><animateMotion dur="1.8s" repeatCount="indefinite"><mpath href="#p0"/></animateMotion></circle>
    <circle r="5"><animateMotion dur="1.8s" begin="0.9s" repeatCount="indefinite"><mpath href="#p0"/></animateMotion></circle>
  </g>
  <text x="600" y="232" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="15" fill="#ff9a3c" opacity=".85">API</text>

  <!-- storefront head (frontend) -->
  <g>
    <rect x="162" y="160" width="250" height="180" rx="16" fill="#16161a" stroke="#ffffff" stroke-opacity=".14"/>
    <path d="M162 188 h250" stroke="#ffffff" stroke-opacity=".12" stroke-width="1.5"/>
    <circle cx="182" cy="174" r="4" fill="#ffffff" opacity=".25"/>
    <circle cx="198" cy="174" r="4" fill="#ffffff" opacity=".25"/>
    <circle cx="214" cy="174" r="4" fill="#ffffff" opacity=".25"/>
    <!-- storefront awning -->
    <g transform="translate(186,206)">
      <path d="M0 0 H200 V18 H0 Z" fill="#ff7a18" opacity=".55"/>
      <g fill="#ff9a3c" opacity=".4">
        <path d="M0 18 l16 16 l16 -16 Z"/>
        <path d="M40 18 l16 16 l16 -16 Z"/>
        <path d="M80 18 l16 16 l16 -16 Z"/>
        <path d="M120 18 l16 16 l16 -16 Z"/>
        <path d="M160 18 l16 16 l16 -16 Z"/>
      </g>
    </g>
    <g fill="#ffffff" opacity=".10">
      <rect x="200" y="270" width="80" height="44" rx="6"/>
      <rect x="294" y="270" width="80" height="44" rx="6"/>
    </g>
    <text x="287" y="330" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="17" fill="#ffffff" opacity=".4">Frontend (Head)</text>
  </g>

  <!-- commerce backend box -->
  <g>
    <rect x="788" y="150" width="250" height="200" rx="20" fill="url(#server)" stroke="#ff7a18" stroke-opacity=".7" stroke-width="2.5"/>
    <rect x="788" y="150" width="250" height="200" rx="20" fill="none" stroke="#ff7a18" stroke-opacity=".25" stroke-width="10" filter="url(#soft)"/>
    <!-- backend stack lines -->
    <g stroke="#ff9a3c" stroke-width="3" fill="none" opacity=".8">
      <rect x="826" y="186" width="174" height="26" rx="6"/>
      <rect x="826" y="226" width="174" height="26" rx="6"/>
      <rect x="826" y="266" width="174" height="26" rx="6"/>
    </g>
    <g fill="#ff9a3c">
      <circle class="pulse" cx="842" cy="199" r="4"/>
      <circle class="pulse2" cx="842" cy="239" r="4"/>
      <circle class="pulse" cx="842" cy="279" r="4"/>
    </g>
    <text x="913" y="334" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" fill="#ff9a3c" opacity=".85">Commerce-Backend</text>
  </g>
</svg>
