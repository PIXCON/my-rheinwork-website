<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="Website Performance">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#15110b"/><stop offset="1" stop-color="#0b0b0d"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="2%" r="75%"><stop offset="0" stop-color="#ff7a18" stop-opacity=".20"/><stop offset="55%" stop-color="#ff7a18" stop-opacity="0"/></radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="7"/></filter>
    <style>
      .needle{transform-origin:600px 340px;animation:sweep 4s ease-in-out infinite}
      @keyframes sweep{0%,100%{transform:rotate(-9deg)}50%{transform:rotate(6deg)}}
      .blink{animation:blink 1.8s ease-in-out infinite}
      @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
    </style>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <g fill="#ffffff" opacity="0.018">
    <rect x="70" y="-20" width="120" height="540" rx="60"/><rect x="320" y="-20" width="150" height="540" rx="75"/>
    <rect x="600" y="-20" width="120" height="540" rx="60"/><rect x="860" y="-20" width="150" height="540" rx="75"/><rect x="1110" y="-20" width="120" height="540" rx="60"/>
  </g>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- speed gauge -->
  <path d="M450 340 A150 150 0 0 1 750 340" fill="none" stroke="#ffffff" stroke-opacity=".12" stroke-width="18" stroke-linecap="round"/>
  <path d="M450 340 A150 150 0 0 1 716 252" fill="none" stroke="#ff7a18" stroke-width="18" stroke-linecap="round"/>
  <path d="M450 340 A150 150 0 0 1 716 252" fill="none" stroke="#ff7a18" stroke-opacity=".5" stroke-width="30" stroke-linecap="round" filter="url(#soft)"/>
  <!-- ticks -->
  <g stroke="#ffffff" stroke-opacity=".25" stroke-width="3" stroke-linecap="round">
    <path d="M470 287 l16 9"/><path d="M512 245 l11 14"/><path d="M600 230 v18"/><path d="M688 245 l-11 14"/><path d="M730 287 l-16 9"/>
  </g>
  <!-- needle -->
  <g class="needle">
    <path d="M600 340 L690 262" stroke="#ff9a3c" stroke-width="7" stroke-linecap="round"/>
  </g>
  <circle cx="600" cy="340" r="14" fill="#ff9a3c"/><circle cx="600" cy="340" r="6" fill="#15110b"/>
  <text x="600" y="392" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="38" font-weight="700" fill="#ffffff">100</text>

  <!-- lightning -->
  <path class="blink" d="M404 150 l-30 58 h22 l-16 56 l50 -74 h-24 l20 -40 z" fill="#ff7a18"/>
  <!-- speed lines -->
  <g stroke="#ff9a3c" stroke-width="6" stroke-linecap="round" opacity=".8">
    <path d="M812 205 h70"/><path d="M792 230 h90"/><path d="M822 255 h60"/>
  </g>
</svg>
