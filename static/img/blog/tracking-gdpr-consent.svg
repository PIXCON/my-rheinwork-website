<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="Privacy shield with cookie consent toggle">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15110b"/>
      <stop offset="1" stop-color="#0b0b0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="2%" r="75%">
      <stop offset="0" stop-color="#ff7a18" stop-opacity=".20"/>
      <stop offset="55%" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a0c"/>
      <stop offset="1" stop-color="#140f0a"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      .pulse2{animation:pulse 3.2s ease-in-out infinite;animation-delay:1.1s}
      @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="500" fill="url(#bg)"/>
  <!-- faint brand columns -->
  <g fill="#ffffff" opacity="0.018">
    <rect x="70"  y="-20" width="120" height="540" rx="60"/>
    <rect x="320" y="-20" width="150" height="540" rx="75"/>
    <rect x="600" y="-20" width="120" height="540" rx="60"/>
    <rect x="860" y="-20" width="150" height="540" rx="75"/>
    <rect x="1110" y="-20" width="120" height="540" rx="60"/>
  </g>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- central motif: privacy shield -->
  <g transform="translate(600,250)">
    <!-- shield glow -->
    <path d="M0 -150 L130 -108 V20 C130 110 70 150 0 178 C-70 150 -130 110 -130 20 V-108 Z"
          fill="none" stroke="#ff7a18" stroke-opacity=".25" stroke-width="14" filter="url(#soft)"/>
    <!-- shield body -->
    <path d="M0 -150 L130 -108 V20 C130 110 70 150 0 178 C-70 150 -130 110 -130 20 V-108 Z"
          fill="url(#shield)" stroke="#ff7a18" stroke-opacity=".7" stroke-width="2.5"/>
    <!-- cookie inside shield -->
    <g transform="translate(0,-44)">
      <circle r="48" fill="#16161a" stroke="#ff9a3c" stroke-width="2.5" stroke-opacity=".8"/>
      <g fill="#ff9a3c">
        <circle cx="-18" cy="-14" r="6" class="pulse"/>
        <circle cx="16" cy="-20" r="5" class="pulse2"/>
        <circle cx="20" cy="10" r="6" class="pulse"/>
        <circle cx="-10" cy="18" r="5" class="pulse2"/>
        <circle cx="-2" cy="-1" r="4" class="pulse"/>
      </g>
    </g>
    <!-- consent toggle (on) inside shield -->
    <g transform="translate(0,62)">
      <rect x="-56" y="-18" width="112" height="36" rx="18" fill="#241a0c" stroke="#ff7a18" stroke-opacity=".7" stroke-width="2.5"/>
      <circle cx="30" cy="0" r="13" fill="#ff9a3c"/>
      <path d="M24 0 l5 5 l9 -11" fill="none" stroke="#140f0a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <text x="600" y="438" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="17" fill="#ff9a3c" opacity=".85">Consent &amp; Datenschutz</text>
</svg>
