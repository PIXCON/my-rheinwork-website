<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="First-party data store and attribution funnel">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15110b"/>
      <stop offset="1" stop-color="#0b0b0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="2%" r="75%">
      <stop offset="0" stop-color="#ff7a18" stop-opacity=".20"/>
      <stop offset="55%" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="server" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a0c"/>
      <stop offset="1" stop-color="#140f0a"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      .pulse2{animation:pulse 3.2s ease-in-out infinite;animation-delay:1.1s}
      @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="500" fill="url(#bg)"/>
  <!-- faint brand columns -->
  <g fill="#ffffff" opacity="0.018">
    <rect x="70"  y="-20" width="120" height="540" rx="60"/>
    <rect x="320" y="-20" width="150" height="540" rx="75"/>
    <rect x="600" y="-20" width="120" height="540" rx="60"/>
    <rect x="860" y="-20" width="150" height="540" rx="75"/>
    <rect x="1110" y="-20" width="120" height="540" rx="60"/>
  </g>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- connection paths: many sources into one store, then store to funnel -->
  <g fill="none" stroke="#ff7a18" stroke-opacity=".35" stroke-width="2.5">
    <path id="p0" d="M300 150 H512 V210"/>
    <path id="p1" d="M300 250 H512"/>
    <path id="p2" d="M300 350 H512 V290"/>
    <path id="p3" d="M690 250 H912"/>
  </g>
  <g fill="#ff9a3c">
    <circle r="5"><animateMotion dur="1.6s" repeatCount="indefinite"><mpath href="#p0"/></animateMotion></circle>
    <circle r="5"><animateMotion dur="1.8s" begin="0.5s" repeatCount="indefinite"><mpath href="#p1"/></animateMotion></circle>
    <circle r="5"><animateMotion dur="1.7s" begin="0.9s" repeatCount="indefinite"><mpath href="#p2"/></animateMotion></circle>
    <circle r="5"><animateMotion dur="1.8s" begin="0.6s" repeatCount="indefinite"><mpath href="#p3"/></animateMotion></circle>
  </g>

  <!-- scattered data sources (left) -->
  <g>
    <g transform="translate(120,118)">
      <rect width="170" height="64" rx="12" fill="#16161a" stroke="#ffffff" stroke-opacity=".14"/>
      <circle cx="30" cy="32" r="10" fill="#ff7a18" opacity=".55"/>
      <g fill="#ffffff" opacity=".10"><rect x="54" y="22" width="96" height="9" rx="4.5"/><rect x="54" y="38" width="70" height="9" rx="4.5"/></g>
    </g>
    <g transform="translate(120,218)">
      <rect width="170" height="64" rx="12" fill="#16161a" stroke="#ffffff" stroke-opacity=".14"/>
      <circle cx="30" cy="32" r="10" fill="#ff7a18" opacity=".55"/>
      <g fill="#ffffff" opacity=".10"><rect x="54" y="22" width="96" height="9" rx="4.5"/><rect x="54" y="38" width="70" height="9" rx="4.5"/></g>
    </g>
    <g transform="translate(120,318)">
      <rect width="170" height="64" rx="12" fill="#16161a" stroke="#ffffff" stroke-opacity=".14"/>
      <circle cx="30" cy="32" r="10" fill="#ff7a18" opacity=".55"/>
      <g fill="#ffffff" opacity=".10"><rect x="54" y="22" width="96" height="9" rx="4.5"/><rect x="54" y="38" width="70" height="9" rx="4.5"/></g>
    </g>
    <text x="205" y="408" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="17" fill="#ffffff" opacity=".4">Datenquellen</text>
  </g>

  <!-- consolidated owned data store (centre) -->
  <g>
    <rect x="512" y="150" width="178" height="200" rx="20" fill="url(#server)" stroke="#ff7a18" stroke-opacity=".7" stroke-width="2.5"/>
    <rect x="512" y="150" width="178" height="200" rx="20" fill="none" stroke="#ff7a18" stroke-opacity=".25" stroke-width="10" filter="url(#soft)"/>
    <!-- database cylinder (consolidated store) -->
    <g transform="translate(601,250)" stroke="#ff9a3c" stroke-width="3" fill="none">
      <ellipse cx="0" cy="-34" rx="38" ry="13"/>
      <path d="M-38 -34 V 34"/><path d="M38 -34 V 34"/>
      <path d="M-38 34 A 38 13 0 0 0 38 34"/>
      <path d="M-38 0 A 38 13 0 0 0 38 0"/>
      <path d="M-38 -17 A 38 13 0 0 0 38 -17"/>
    </g>
    <text x="601" y="334" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" fill="#ff9a3c" opacity=".85">First-Party-Store</text>
  </g>

  <!-- attribution funnel (right) -->
  <g>
    <rect x="912" y="172" width="176" height="156" rx="16" fill="#16161a" stroke="#ffffff" stroke-opacity=".16"/>
    <g stroke="#ff9a3c" stroke-width="13" stroke-linecap="round">
      <path class="pulse"  d="M962 212 H1038"/>
      <path class="pulse2" d="M972 244 H1028"/>
      <path class="pulse"  d="M982 276 H1018"/>
    </g>
    <circle cx="1000" cy="300" r="6" fill="#ff7a18"/>
    <text x="1000" y="350" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="17" fill="#ffffff" opacity=".4">Attribution</text>
  </g>
</svg>
