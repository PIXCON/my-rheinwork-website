<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="Decision fork between a ready-made shop and a custom-built shop">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15110b"/>
      <stop offset="1" stop-color="#0b0b0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="2%" r="75%">
      <stop offset="0" stop-color="#ff7a18" stop-opacity=".20"/>
      <stop offset="55%" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="server" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a0c"/>
      <stop offset="1" stop-color="#140f0a"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      .pulse2{animation:pulse 3.2s ease-in-out infinite;animation-delay:1.1s}
      @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="500" fill="url(#bg)"/>
  <!-- faint brand columns -->
  <g fill="#ffffff" opacity="0.018">
    <rect x="70"  y="-20" width="120" height="540" rx="60"/>
    <rect x="320" y="-20" width="150" height="540" rx="75"/>
    <rect x="600" y="-20" width="120" height="540" rx="60"/>
    <rect x="860" y="-20" width="150" height="540" rx="75"/>
    <rect x="1110" y="-20" width="120" height="540" rx="60"/>
  </g>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- decision fork paths from the central node -->
  <g fill="none" stroke="#ff7a18" stroke-opacity=".35" stroke-width="2.5">
    <path id="p0" d="M600 250 C 480 250 440 198 320 198"/>
    <path id="p1" d="M600 250 C 720 250 760 198 880 198"/>
  </g>
  <g fill="#ff9a3c">
    <circle r="5"><animateMotion dur="1.6s" repeatCount="indefinite"><mpath href="#p0"/></animateMotion></circle>
    <circle r="5"><animateMotion dur="1.8s" begin="0.6s" repeatCount="indefinite"><mpath href="#p1"/></animateMotion></circle>
  </g>

  <!-- central decision node (fork) -->
  <g>
    <circle cx="600" cy="250" r="34" fill="url(#server)" stroke="#ff7a18" stroke-opacity=".7" stroke-width="2.5"/>
    <circle cx="600" cy="250" r="34" fill="none" stroke="#ff7a18" stroke-opacity=".25" stroke-width="10" filter="url(#soft)"/>
    <g transform="translate(600,250)" stroke="#ff9a3c" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M0 12 V -2"/>
      <path d="M0 -2 L -12 -14"/>
      <path d="M0 -2 L 12 -14"/>
      <circle cx="-12" cy="-16" r="3.5" fill="#ff9a3c" stroke="none"/>
      <circle cx="12" cy="-16" r="3.5" fill="#ff9a3c" stroke="none"/>
    </g>
    <text x="600" y="320" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" fill="#ff9a3c" opacity=".85">Entscheidung</text>
  </g>

  <!-- left: ready-made shop box (SaaS / Shopify) -->
  <g>
    <rect x="156" y="120" width="328" height="156" rx="16" fill="#16161a" stroke="#ffffff" stroke-opacity=".14"/>
    <!-- lid of the ready-made box -->
    <path d="M156 150 h328" stroke="#ffffff" stroke-opacity=".12" stroke-width="1.5"/>
    <path d="M286 120 h68 v30 h-68 z" fill="#ff7a18" opacity=".30"/>
    <g fill="#ffffff" opacity=".10">
      <rect x="184" y="172" width="180" height="12" rx="6"/>
      <rect x="184" y="196" width="240" height="12" rx="6"/>
      <rect x="184" y="220" width="140" height="12" rx="6"/>
    </g>
    <rect x="184" y="244" width="120" height="16" rx="8" fill="#ff7a18" opacity=".55"/>
    <text x="320" y="300" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="17" fill="#ffffff" opacity=".4">Fertiger Shop</text>
  </g>

  <!-- right: custom-built shop (under construction / blueprint) -->
  <g>
    <rect x="716" y="120" width="328" height="156" rx="16" fill="#16161a" stroke="#ffffff" stroke-opacity=".16"/>
    <path d="M716 150 h328" stroke="#ffffff" stroke-opacity=".12" stroke-width="1.5"/>
    <!-- blueprint grid -->
    <g stroke="#ff9a3c" stroke-opacity=".25" stroke-width="1">
      <path d="M760 150 V 276"/><path d="M820 150 V 276"/><path d="M880 150 V 276"/><path d="M940 150 V 276"/><path d="M1000 150 V 276"/>
      <path d="M716 186 H 1044"/><path d="M716 222 H 1044"/>
    </g>
    <!-- building blocks -->
    <g class="pulse" fill="#ff9a3c" opacity=".55">
      <rect x="764" y="226" width="44" height="44" rx="4"/>
      <rect x="828" y="226" width="44" height="44" rx="4"/>
    </g>
    <g class="pulse2" fill="#ff9a3c" opacity=".55">
      <rect x="892" y="226" width="44" height="44" rx="4"/>
      <rect x="796" y="178" width="44" height="44" rx="4"/>
    </g>
    <text x="880" y="300" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="17" fill="#ffffff" opacity=".4">Eigener Shop</text>
  </g>
</svg>
