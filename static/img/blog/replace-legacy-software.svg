<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="Legacy system being replaced module by module">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15110b"/>
      <stop offset="1" stop-color="#0b0b0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="2%" r="75%">
      <stop offset="0" stop-color="#ff7a18" stop-opacity=".20"/>
      <stop offset="55%" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="newmod" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a0c"/>
      <stop offset="1" stop-color="#140f0a"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .swap{animation:swap 3.4s ease-in-out infinite}
      .swap2{animation:swap 3.4s ease-in-out infinite;animation-delay:1.2s}
      @keyframes swap{0%,100%{opacity:.45}50%{opacity:1}}
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="500" fill="url(#bg)"/>
  <!-- faint brand columns -->
  <g fill="#ffffff" opacity="0.018">
    <rect x="70"  y="-20" width="120" height="540" rx="60"/>
    <rect x="320" y="-20" width="150" height="540" rx="75"/>
    <rect x="600" y="-20" width="120" height="540" rx="60"/>
    <rect x="860" y="-20" width="150" height="540" rx="75"/>
    <rect x="1110" y="-20" width="120" height="540" rx="60"/>
  </g>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- legacy monolith (left) -->
  <g>
    <rect x="150" y="120" width="230" height="260" rx="18" fill="#16161a" stroke="#ffffff" stroke-opacity=".14"/>
    <g fill="#ffffff" opacity=".10">
      <rect x="178" y="150" width="174" height="44" rx="8"/>
      <rect x="178" y="208" width="174" height="44" rx="8"/>
      <rect x="178" y="266" width="174" height="44" rx="8"/>
      <rect x="178" y="324" width="174" height="32" rx="8"/>
    </g>
    <text x="265" y="404" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="17" fill="#ffffff" opacity=".4">Legacy-System</text>
  </g>

  <!-- transfer arrow -->
  <g fill="none" stroke="#ff7a18" stroke-opacity=".35" stroke-width="2.5">
    <path id="p0" d="M390 250 H560"/>
  </g>
  <g fill="#ff9a3c">
    <circle r="5"><animateMotion dur="1.7s" repeatCount="indefinite"><mpath href="#p0"/></animateMotion></circle>
  </g>

  <!-- replacement stack (right): new modules swapping in -->
  <g>
    <!-- new module 1 (replaced) -->
    <rect class="swap" x="600" y="120" width="240" height="56" rx="12" fill="url(#newmod)" stroke="#ff7a18" stroke-opacity=".7" stroke-width="2.5"/>
    <rect x="600" y="120" width="240" height="56" rx="12" fill="none" stroke="#ff7a18" stroke-opacity=".22" stroke-width="9" filter="url(#soft)"/>
    <circle cx="628" cy="148" r="8" fill="#ff9a3c"/>
    <!-- old module 2 (not yet replaced) -->
    <rect x="600" y="190" width="240" height="56" rx="12" fill="#16161a" stroke="#ffffff" stroke-opacity=".14"/>
    <rect x="620" y="212" width="120" height="12" rx="6" fill="#ffffff" opacity=".10"/>
    <!-- new module 3 (replaced) -->
    <rect class="swap2" x="600" y="260" width="240" height="56" rx="12" fill="url(#newmod)" stroke="#ff7a18" stroke-opacity=".7" stroke-width="2.5"/>
    <rect x="600" y="260" width="240" height="56" rx="12" fill="none" stroke="#ff7a18" stroke-opacity=".22" stroke-width="9" filter="url(#soft)"/>
    <circle cx="628" cy="288" r="8" fill="#ff9a3c"/>
    <!-- old module 4 -->
    <rect x="600" y="330" width="240" height="50" rx="12" fill="#16161a" stroke="#ffffff" stroke-opacity=".14"/>
    <rect x="620" y="350" width="150" height="12" rx="6" fill="#ffffff" opacity=".10"/>
    <text x="720" y="404" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" fill="#ff9a3c" opacity=".85">Schritt fuer Schritt</text>
  </g>
</svg>
