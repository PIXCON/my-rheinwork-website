<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="Server-Side Tracking">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15110b"/>
      <stop offset="1" stop-color="#0b0b0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="2%" r="75%">
      <stop offset="0" stop-color="#ff7a18" stop-opacity=".20"/>
      <stop offset="55%" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="server" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a0c"/>
      <stop offset="1" stop-color="#140f0a"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      .pulse2{animation:pulse 3.2s ease-in-out infinite;animation-delay:1.1s}
      .pulse3{animation:pulse 3.2s ease-in-out infinite;animation-delay:2.0s}
      @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="500" fill="url(#bg)"/>
  <!-- faint brand columns -->
  <g fill="#ffffff" opacity="0.018">
    <rect x="70"  y="-20" width="120" height="540" rx="60"/>
    <rect x="320" y="-20" width="150" height="540" rx="75"/>
    <rect x="600" y="-20" width="120" height="540" rx="60"/>
    <rect x="860" y="-20" width="150" height="540" rx="75"/>
    <rect x="1110" y="-20" width="120" height="540" rx="60"/>
  </g>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- connection paths -->
  <g fill="none" stroke="#ff7a18" stroke-opacity=".35" stroke-width="2.5">
    <path id="p0" d="M362 250 H512"/>
    <path id="p1" d="M690 214 C 790 214, 815 176, 912 176"/>
    <path id="p2" d="M690 250 H912"/>
    <path id="p3" d="M690 286 C 790 286, 815 324, 912 324"/>
  </g>

  <!-- flowing data dots -->
  <g fill="#ff9a3c">
    <circle r="5"><animateMotion dur="1.6s" repeatCount="indefinite" rotate="0"><mpath href="#p0"/></animateMotion></circle>
    <circle r="4.5"><animateMotion dur="2.0s" begin="0.4s" repeatCount="indefinite"><mpath href="#p1"/></animateMotion></circle>
    <circle r="4.5"><animateMotion dur="2.0s" begin="1.0s" repeatCount="indefinite"><mpath href="#p2"/></animateMotion></circle>
    <circle r="4.5"><animateMotion dur="2.0s" begin="1.6s" repeatCount="indefinite"><mpath href="#p3"/></animateMotion></circle>
  </g>

  <!-- browser (client) -->
  <g>
    <rect x="112" y="172" width="250" height="156" rx="16" fill="#16161a" stroke="#ffffff" stroke-opacity=".14"/>
    <path d="M112 200 h250" stroke="#ffffff" stroke-opacity=".12" stroke-width="1.5"/>
    <circle cx="132" cy="186" r="4" fill="#ffffff" opacity=".25"/>
    <circle cx="148" cy="186" r="4" fill="#ffffff" opacity=".25"/>
    <circle cx="164" cy="186" r="4" fill="#ffffff" opacity=".25"/>
    <g fill="#ffffff" opacity=".10">
      <rect x="136" y="222" width="150" height="12" rx="6"/>
      <rect x="136" y="246" width="200" height="12" rx="6"/>
      <rect x="136" y="270" width="120" height="12" rx="6"/>
    </g>
    <rect x="136" y="296" width="90" height="16" rx="8" fill="#ff7a18" opacity=".55"/>
  </g>

  <!-- server (your infrastructure) -->
  <g>
    <rect x="512" y="150" width="178" height="200" rx="20" fill="url(#server)" stroke="#ff7a18" stroke-opacity=".7" stroke-width="2.5"/>
    <rect x="512" y="150" width="178" height="200" rx="20" fill="none" stroke="#ff7a18" stroke-opacity=".25" stroke-width="10" filter="url(#soft)"/>
    <g>
      <rect x="536" y="176" width="130" height="34" rx="9" fill="#ffffff" opacity=".05"/>
      <rect x="536" y="222" width="130" height="34" rx="9" fill="#ffffff" opacity=".05"/>
      <circle class="pulse" cx="552" cy="193" r="5" fill="#ff9a3c"/>
      <circle class="pulse2" cx="552" cy="239" r="5" fill="#ff9a3c"/>
      <rect x="572" y="188" width="80" height="10" rx="5" fill="#ffffff" opacity=".14"/>
      <rect x="572" y="234" width="80" height="10" rx="5" fill="#ffffff" opacity=".14"/>
    </g>
    <!-- shield / EU privacy mark -->
    <path d="M601 280 l30 10 v18 c0 19 -13 30 -30 36 c-17 -6 -30 -17 -30 -36 v-18 z" fill="#ff7a18" fill-opacity=".16" stroke="#ff7a18" stroke-opacity=".8" stroke-width="2.5"/>
    <path d="M589 314 l9 9 l16 -18" fill="none" stroke="#ff9a3c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- tools (destinations) -->
  <g>
    <!-- analytics -->
    <circle class="pulse" cx="942" cy="176" r="32" fill="#16161a" stroke="#ffffff" stroke-opacity=".16"/>
    <g stroke="#ff9a3c" stroke-width="3" stroke-linecap="round">
      <path d="M931 186 v-6"/><path d="M942 186 v-14"/><path d="M953 186 v-20"/>
    </g>
    <!-- ads / target -->
    <circle class="pulse2" cx="942" cy="250" r="32" fill="#16161a" stroke="#ffffff" stroke-opacity=".16"/>
    <circle cx="942" cy="250" r="13" fill="none" stroke="#ff9a3c" stroke-width="3"/>
    <circle cx="942" cy="250" r="4" fill="#ff9a3c"/>
    <!-- warehouse / database -->
    <circle class="pulse3" cx="942" cy="324" r="32" fill="#16161a" stroke="#ffffff" stroke-opacity=".16"/>
    <g fill="none" stroke="#ff9a3c" stroke-width="3">
      <ellipse cx="942" cy="314" rx="13" ry="5"/>
      <path d="M929 314 v18 c0 3 6 5 13 5 s13 -2 13 -5 v-18"/>
    </g>
  </g>
</svg>
