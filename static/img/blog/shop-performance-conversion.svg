<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="Shop performance and conversion">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15110b"/>
      <stop offset="1" stop-color="#0b0b0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="2%" r="75%">
      <stop offset="0" stop-color="#ff7a18" stop-opacity=".20"/>
      <stop offset="55%" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="server" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a0c"/>
      <stop offset="1" stop-color="#140f0a"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      .pulse2{animation:pulse 3.2s ease-in-out infinite;animation-delay:1.1s}
      .needle{transform-origin:601px 300px;animation:sweep 3.4s ease-in-out infinite}
      @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
      @keyframes sweep{0%,100%{transform:rotate(-46deg)}50%{transform:rotate(44deg)}}
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="500" fill="url(#bg)"/>
  <!-- faint brand columns -->
  <g fill="#ffffff" opacity="0.018">
    <rect x="70"  y="-20" width="120" height="540" rx="60"/>
    <rect x="320" y="-20" width="150" height="540" rx="75"/>
    <rect x="600" y="-20" width="120" height="540" rx="60"/>
    <rect x="860" y="-20" width="150" height="540" rx="75"/>
    <rect x="1110" y="-20" width="120" height="540" rx="60"/>
  </g>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- connection paths -->
  <g fill="none" stroke="#ff7a18" stroke-opacity=".35" stroke-width="2.5">
    <path id="p0" d="M362 250 H512"/>
    <path id="p1" d="M712 250 H912"/>
  </g>
  <g fill="#ff9a3c">
    <circle r="5"><animateMotion dur="1.6s" repeatCount="indefinite"><mpath href="#p0"/></animateMotion></circle>
    <circle r="5"><animateMotion dur="1.8s" begin="0.6s" repeatCount="indefinite"><mpath href="#p1"/></animateMotion></circle>
  </g>

  <!-- shopping cart -->
  <g>
    <rect x="112" y="172" width="250" height="156" rx="16" fill="#16161a" stroke="#ffffff" stroke-opacity=".14"/>
    <g transform="translate(170,210)" stroke="#ff9a3c" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 0 H18 L34 64 H92 L108 18 H30"/>
      <circle cx="42" cy="86" r="9" fill="#ff9a3c" stroke="none"/>
      <circle cx="88" cy="86" r="9" fill="#ff9a3c" stroke="none"/>
    </g>
    <text x="237" y="350" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="17" fill="#ffffff" opacity=".4">Warenkorb</text>
  </g>

  <!-- speed gauge (performance) -->
  <g>
    <rect x="512" y="150" width="200" height="200" rx="20" fill="url(#server)" stroke="#ff7a18" stroke-opacity=".7" stroke-width="2.5"/>
    <rect x="512" y="150" width="200" height="200" rx="20" fill="none" stroke="#ff7a18" stroke-opacity=".25" stroke-width="10" filter="url(#soft)"/>
    <!-- gauge arc -->
    <path d="M548 300 A 56 56 0 0 1 654 300" fill="none" stroke="#ffffff" stroke-opacity=".18" stroke-width="8" stroke-linecap="round"/>
    <path d="M548 300 A 56 56 0 0 1 601 246" fill="none" stroke="#ff9a3c" stroke-width="8" stroke-linecap="round"/>
    <g class="needle" stroke="#ff9a3c" stroke-width="4" stroke-linecap="round">
      <path d="M601 300 V 252"/>
    </g>
    <circle cx="601" cy="300" r="7" fill="#ff9a3c"/>
    <text x="601" y="334" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" fill="#ff9a3c" opacity=".85">Speed</text>
  </g>

  <!-- rising sales bars -->
  <g>
    <rect x="912" y="172" width="176" height="156" rx="16" fill="#16161a" stroke="#ffffff" stroke-opacity=".16"/>
    <g stroke="#ff9a3c" stroke-width="14" stroke-linecap="round">
      <path class="pulse"  d="M952 296 V 256"/>
      <path class="pulse2" d="M1000 296 V 232"/>
      <path class="pulse"  d="M1048 296 V 212"/>
    </g>
    <text x="1000" y="350" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="17" fill="#ffffff" opacity=".4">Umsatz</text>
  </g>
</svg>
