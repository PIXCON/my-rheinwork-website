<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="A decision fork between building and buying software">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15110b"/>
      <stop offset="1" stop-color="#0b0b0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="2%" r="75%">
      <stop offset="0" stop-color="#ff7a18" stop-opacity=".20"/>
      <stop offset="55%" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="server" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a0c"/>
      <stop offset="1" stop-color="#140f0a"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      .pulse2{animation:pulse 3.2s ease-in-out infinite;animation-delay:1.1s}
      @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="500" fill="url(#bg)"/>
  <!-- faint brand columns -->
  <g fill="#ffffff" opacity="0.018">
    <rect x="70"  y="-20" width="120" height="540" rx="60"/>
    <rect x="320" y="-20" width="150" height="540" rx="75"/>
    <rect x="600" y="-20" width="120" height="540" rx="60"/>
    <rect x="860" y="-20" width="150" height="540" rx="75"/>
    <rect x="1110" y="-20" width="120" height="540" rx="60"/>
  </g>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- fork paths from decision node to two destinations -->
  <g fill="none" stroke="#ff7a18" stroke-opacity=".35" stroke-width="2.5">
    <path id="pL" d="M601 280 C 470 320, 380 300, 300 250"/>
    <path id="pR" d="M601 280 C 732 320, 822 300, 900 250"/>
  </g>
  <g fill="#ff9a3c">
    <circle r="5"><animateMotion dur="1.7s" repeatCount="indefinite"><mpath href="#pL"/></animateMotion></circle>
    <circle r="5"><animateMotion dur="1.9s" begin="0.6s" repeatCount="indefinite"><mpath href="#pR"/></animateMotion></circle>
  </g>

  <!-- decision node (center) -->
  <g>
    <circle cx="601" cy="280" r="46" fill="url(#server)" stroke="#ff7a18" stroke-opacity=".7" stroke-width="2.5"/>
    <circle cx="601" cy="280" r="46" fill="none" stroke="#ff7a18" stroke-opacity=".25" stroke-width="10" filter="url(#soft)"/>
    <!-- fork glyph -->
    <g transform="translate(601,280)" stroke="#ff9a3c" stroke-width="3.5" fill="none" stroke-linecap="round">
      <path d="M0 20 V 0"/>
      <path d="M0 0 L -16 -18"/>
      <path d="M0 0 L 16 -18"/>
      <circle cx="0" cy="22" r="3.5" fill="#ff9a3c" stroke="none"/>
      <circle cx="-16" cy="-20" r="3.5" fill="#ff9a3c" stroke="none"/>
      <circle cx="16" cy="-20" r="3.5" fill="#ff9a3c" stroke="none"/>
    </g>
    <text x="601" y="358" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" fill="#ff9a3c" opacity=".85">Entscheidung</text>
  </g>

  <!-- BUILD destination (code blocks) -->
  <g>
    <rect x="120" y="172" width="220" height="156" rx="16" fill="#16161a" stroke="#ffffff" stroke-opacity=".16"/>
    <path d="M120 200 h220" stroke="#ffffff" stroke-opacity=".12" stroke-width="1.5"/>
    <circle cx="140" cy="186" r="4" fill="#ffffff" opacity=".25"/>
    <circle cx="156" cy="186" r="4" fill="#ffffff" opacity=".25"/>
    <g fill="#ff9a3c">
      <rect class="pulse"  x="144" y="222" width="110" height="11" rx="5.5" opacity=".5"/>
      <rect class="pulse2" x="164" y="244" width="140" height="11" rx="5.5" opacity=".5"/>
      <rect class="pulse"  x="144" y="266" width="90"  height="11" rx="5.5" opacity=".5"/>
    </g>
    <text x="230" y="350" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="17" fill="#ffffff" opacity=".4">Build</text>
  </g>

  <!-- BUY destination (boxed package) -->
  <g>
    <rect x="860" y="172" width="220" height="156" rx="16" fill="#16161a" stroke="#ffffff" stroke-opacity=".16"/>
    <g transform="translate(970,250)" stroke="#ff9a3c" stroke-width="3" fill="none">
      <path d="M-44 -22 L 0 -44 L 44 -22 L 44 28 L 0 50 L -44 28 Z"/>
      <path d="M-44 -22 L 0 0 L 44 -22"/>
      <path d="M0 0 V 50"/>
      <path d="M-22 -33 L 22 -11" stroke-opacity=".55"/>
    </g>
    <text x="970" y="350" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="17" fill="#ffffff" opacity=".4">Buy</text>
  </g>
</svg>
