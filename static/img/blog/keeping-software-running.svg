<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="Reliable operations">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#15110b"/><stop offset="1" stop-color="#0b0b0d"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="2%" r="75%"><stop offset="0" stop-color="#ff7a18" stop-opacity=".20"/><stop offset="55%" stop-color="#ff7a18" stop-opacity="0"/></radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1a1a1f"/><stop offset="1" stop-color="#101013"/></linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="6"/></filter>
    <style>
      .ekg{stroke-dasharray:560;stroke-dashoffset:560;animation:draw 3.4s linear infinite}
      @keyframes draw{to{stroke-dashoffset:-560}}
      .blip{animation:blip 3.4s linear infinite}
      @keyframes blip{0%,46%{opacity:0}50%{opacity:1}54%,100%{opacity:0}}
      .star{animation:tw 2.6s ease-in-out infinite}@keyframes tw{0%,100%{opacity:.25}50%{opacity:.9}}
    </style>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <g fill="#ffffff" opacity="0.018">
    <rect x="70" y="-20" width="120" height="540" rx="60"/><rect x="320" y="-20" width="150" height="540" rx="75"/>
    <rect x="600" y="-20" width="120" height="540" rx="60"/><rect x="860" y="-20" width="150" height="540" rx="75"/><rect x="1110" y="-20" width="120" height="540" rx="60"/>
  </g>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- moon + stars (night) -->
  <g>
    <path d="M905 150 a40 40 0 1 0 34 62 a32 32 0 1 1 -34 -62 z" fill="#ff9a3c" opacity=".5"/>
    <g fill="#ffffff"><circle class="star" cx="840" cy="140" r="3"/><circle class="star" cx="980" cy="180" r="2.5" style="animation-delay:1s"/><circle class="star" cx="300" cy="160" r="3" style="animation-delay:1.6s"/></g>
  </g>

  <!-- monitor / dashboard -->
  <g>
    <rect x="360" y="190" width="480" height="200" rx="20" fill="url(#panel)" stroke="#ffffff" stroke-opacity=".14"/>
    <rect x="360" y="190" width="480" height="200" rx="20" fill="none" stroke="#ff7a18" stroke-opacity=".14" stroke-width="10" filter="url(#soft)"/>
    <path d="M360 226 h480" stroke="#ffffff" stroke-opacity=".1" stroke-width="1.5"/>
    <g><circle cx="384" cy="208" r="5" fill="#ff7a18"/><circle cx="404" cy="208" r="5" fill="#ffffff" opacity=".25"/><circle cx="424" cy="208" r="5" fill="#ffffff" opacity=".25"/></g>
    <!-- ekg heartbeat -->
    <polyline class="ekg" points="384,300 470,300 500,300 520,258 548,344 576,300 720,300 816,300" fill="none" stroke="#ff7a18" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle class="blip" cx="548" cy="344" r="7" fill="#ff9a3c"/>
    <!-- status row -->
    <g><circle cx="392" cy="356" r="6" fill="#ff9a3c"/><circle cx="416" cy="356" r="6" fill="#ff9a3c" opacity=".6"/><circle cx="440" cy="356" r="6" fill="#ffffff" opacity=".18"/></g>
  </g>
</svg>
