<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="Website wireframe and a decision between two paths">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15110b"/>
      <stop offset="1" stop-color="#0b0b0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="2%" r="75%">
      <stop offset="0" stop-color="#ff7a18" stop-opacity=".20"/>
      <stop offset="55%" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="server" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a0c"/>
      <stop offset="1" stop-color="#140f0a"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      .pulse2{animation:pulse 3.2s ease-in-out infinite;animation-delay:1.1s}
      @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="500" fill="url(#bg)"/>
  <!-- faint brand columns -->
  <g fill="#ffffff" opacity="0.018">
    <rect x="70"  y="-20" width="120" height="540" rx="60"/>
    <rect x="320" y="-20" width="150" height="540" rx="75"/>
    <rect x="600" y="-20" width="120" height="540" rx="60"/>
    <rect x="860" y="-20" width="150" height="540" rx="75"/>
    <rect x="1110" y="-20" width="120" height="540" rx="60"/>
  </g>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- two diverging paths from decision -->
  <g fill="none" stroke="#ff7a18" stroke-opacity=".35" stroke-width="2.5">
    <path id="p0" d="M362 250 H512"/>
    <path id="p1" d="M690 210 C 800 210 820 200 912 200"/>
    <path id="p2" d="M690 290 C 800 290 820 300 912 300"/>
  </g>
  <g fill="#ff9a3c">
    <circle r="5"><animateMotion dur="1.6s" repeatCount="indefinite"><mpath href="#p0"/></animateMotion></circle>
    <circle r="5"><animateMotion dur="1.8s" begin="0.6s" repeatCount="indefinite"><mpath href="#p1"/></animateMotion></circle>
    <circle r="5"><animateMotion dur="2.0s" begin="0.9s" repeatCount="indefinite"><mpath href="#p2"/></animateMotion></circle>
  </g>

  <!-- website wireframe -->
  <g>
    <rect x="112" y="172" width="250" height="156" rx="16" fill="#16161a" stroke="#ffffff" stroke-opacity=".14"/>
    <path d="M112 200 h250" stroke="#ffffff" stroke-opacity=".12" stroke-width="1.5"/>
    <circle cx="132" cy="186" r="4" fill="#ffffff" opacity=".25"/>
    <circle cx="148" cy="186" r="4" fill="#ffffff" opacity=".25"/>
    <circle cx="164" cy="186" r="4" fill="#ffffff" opacity=".25"/>
    <rect x="136" y="216" width="200" height="40" rx="6" fill="#ffffff" opacity=".08"/>
    <g fill="#ffffff" opacity=".10">
      <rect x="136" y="266" width="58" height="46" rx="6"/>
      <rect x="207" y="266" width="58" height="46" rx="6"/>
      <rect x="278" y="266" width="58" height="46" rx="6"/>
    </g>
    <text x="237" y="350" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="17" fill="#ffffff" opacity=".4">Website</text>
  </g>

  <!-- decision diamond with check -->
  <g>
    <rect x="512" y="150" width="178" height="200" rx="20" fill="url(#server)" stroke="#ff7a18" stroke-opacity=".7" stroke-width="2.5"/>
    <rect x="512" y="150" width="178" height="200" rx="20" fill="none" stroke="#ff7a18" stroke-opacity=".25" stroke-width="10" filter="url(#soft)"/>
    <g transform="translate(601,238)">
      <path d="M0 -34 L 34 0 L 0 34 L -34 0 Z" fill="none" stroke="#ff9a3c" stroke-width="3"/>
      <path d="M-14 0 L -3 12 L 16 -12" fill="none" stroke="#ff9a3c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="601" y="322" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="15" fill="#ff9a3c" opacity=".85">Decision</text>
  </g>

  <!-- two outcomes: DIY and Pro -->
  <g>
    <rect x="912" y="172" width="176" height="64" rx="14" fill="#16161a" stroke="#ffffff" stroke-opacity=".16"/>
    <text class="pulse"  x="1000" y="211" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-weight="700" font-size="17" fill="#ffffff" opacity=".55">DIY</text>
    <rect x="912" y="264" width="176" height="64" rx="14" fill="#16161a" stroke="#ff7a18" stroke-opacity=".6"/>
    <text class="pulse2" x="1000" y="303" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-weight="700" font-size="17" fill="#ff9a3c" opacity=".85">Pro</text>
  </g>
</svg>
