<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="Slow website speed gauge and loading spinner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15110b"/>
      <stop offset="1" stop-color="#0b0b0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="2%" r="75%">
      <stop offset="0" stop-color="#ff7a18" stop-opacity=".20"/>
      <stop offset="55%" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .spin{transform-origin:880px 250px;animation:spin 1.4s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      .sweep{transform-origin:420px 320px;animation:sweep 3.6s ease-in-out infinite alternate}
      @keyframes sweep{0%{transform:rotate(-12deg)}100%{transform:rotate(40deg)}}
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="500" fill="url(#bg)"/>
  <!-- faint brand columns -->
  <g fill="#ffffff" opacity="0.018">
    <rect x="70"  y="-20" width="120" height="540" rx="60"/>
    <rect x="320" y="-20" width="150" height="540" rx="75"/>
    <rect x="600" y="-20" width="120" height="540" rx="60"/>
    <rect x="860" y="-20" width="150" height="540" rx="75"/>
    <rect x="1110" y="-20" width="120" height="540" rx="60"/>
  </g>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- speed gauge (pointing low / slow) -->
  <g>
    <!-- gauge track -->
    <path d="M250 320 A170 170 0 0 1 590 320" fill="none" stroke="#16161a" stroke-width="26" stroke-linecap="round"/>
    <!-- slow (red/orange) arc on the low end -->
    <path d="M250 320 A170 170 0 0 1 312 196" fill="none" stroke="#ff7a18" stroke-width="26" stroke-linecap="round"/>
    <!-- ticks -->
    <g stroke="#ffffff" stroke-opacity=".18" stroke-width="3" stroke-linecap="round">
      <path d="M276 300 l16 -12"/>
      <path d="M420 178 l0 -18"/>
      <path d="M564 300 l-16 -12"/>
    </g>
    <!-- needle pointing to slow side -->
    <g class="sweep">
      <path d="M420 320 L300 252" stroke="#ff9a3c" stroke-width="7" stroke-linecap="round"/>
    </g>
    <circle cx="420" cy="320" r="14" fill="#ff9a3c"/>
    <circle cx="420" cy="320" r="14" fill="none" stroke="#ff7a18" stroke-opacity=".3" stroke-width="10" filter="url(#soft)"/>
    <text x="420" y="392" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="18" fill="#ffffff" opacity=".4">Ladezeit</text>
  </g>

  <!-- loading spinner (still waiting) -->
  <g>
    <g class="spin" fill="none" stroke-linecap="round">
      <circle cx="880" cy="250" r="74" stroke="#16161a" stroke-width="16"/>
      <path d="M880 176 A74 74 0 0 1 954 250" stroke="#ff9a3c" stroke-width="16"/>
    </g>
    <circle cx="880" cy="250" r="74" fill="none" stroke="#ff7a18" stroke-opacity=".18" stroke-width="14" filter="url(#soft)"/>
    <text x="880" y="372" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="18" fill="#ff9a3c" opacity=".85">Lädt …</text>
  </g>
</svg>
