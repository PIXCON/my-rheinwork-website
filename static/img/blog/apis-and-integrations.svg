<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="APIs and integrations: connected systems exchanging data">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15110b"/>
      <stop offset="1" stop-color="#0b0b0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="2%" r="75%">
      <stop offset="0" stop-color="#ff7a18" stop-opacity=".20"/>
      <stop offset="55%" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a0c"/>
      <stop offset="1" stop-color="#140f0a"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      .pulse2{animation:pulse 3.2s ease-in-out infinite;animation-delay:1.1s}
      @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="500" fill="url(#bg)"/>
  <!-- faint brand columns -->
  <g fill="#ffffff" opacity="0.018">
    <rect x="70"  y="-20" width="120" height="540" rx="60"/>
    <rect x="320" y="-20" width="150" height="540" rx="75"/>
    <rect x="600" y="-20" width="120" height="540" rx="60"/>
    <rect x="860" y="-20" width="150" height="540" rx="75"/>
    <rect x="1110" y="-20" width="120" height="540" rx="60"/>
  </g>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- connection paths from hub to nodes -->
  <g fill="none" stroke="#ff7a18" stroke-opacity=".35" stroke-width="2.5">
    <path id="a0" d="M600 250 L300 130"/>
    <path id="a1" d="M600 250 L300 370"/>
    <path id="a2" d="M600 250 L900 130"/>
    <path id="a3" d="M600 250 L900 370"/>
  </g>
  <!-- data packets travelling the links -->
  <g fill="#ff9a3c">
    <circle r="5"><animateMotion dur="1.6s" repeatCount="indefinite"><mpath href="#a0"/></animateMotion></circle>
    <circle r="5"><animateMotion dur="1.8s" begin="0.5s" repeatCount="indefinite"><mpath href="#a1"/></animateMotion></circle>
    <circle r="5"><animateMotion dur="1.7s" begin="0.9s" repeatCount="indefinite"><mpath href="#a2"/></animateMotion></circle>
    <circle r="5"><animateMotion dur="1.9s" begin="0.3s" repeatCount="indefinite"><mpath href="#a3"/></animateMotion></circle>
  </g>

  <!-- outer system nodes -->
  <g font-family="Inter,Segoe UI,sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">
    <g>
      <rect x="234" y="96" width="132" height="68" rx="14" fill="#16161a" stroke="#ffffff" stroke-opacity=".16"/>
      <circle class="pulse" cx="300" cy="130" r="9" fill="#ff9a3c"/>
    </g>
    <g>
      <rect x="234" y="336" width="132" height="68" rx="14" fill="#16161a" stroke="#ffffff" stroke-opacity=".16"/>
      <circle class="pulse2" cx="300" cy="370" r="9" fill="#ff9a3c"/>
    </g>
    <g>
      <rect x="834" y="96" width="132" height="68" rx="14" fill="#16161a" stroke="#ffffff" stroke-opacity=".16"/>
      <circle class="pulse2" cx="900" cy="130" r="9" fill="#ff9a3c"/>
    </g>
    <g>
      <rect x="834" y="336" width="132" height="68" rx="14" fill="#16161a" stroke="#ffffff" stroke-opacity=".16"/>
      <circle class="pulse" cx="900" cy="370" r="9" fill="#ff9a3c"/>
    </g>
  </g>

  <!-- central hub (the API) -->
  <g>
    <circle cx="600" cy="250" r="62" fill="url(#hub)" stroke="#ff7a18" stroke-opacity=".7" stroke-width="2.5"/>
    <circle cx="600" cy="250" r="62" fill="none" stroke="#ff7a18" stroke-opacity=".25" stroke-width="10" filter="url(#soft)"/>
    <g stroke="#ff9a3c" stroke-width="3" fill="none" stroke-linecap="round">
      <circle cx="600" cy="250" r="22"/>
      <path d="M600 196 V 216"/><path d="M600 284 V 304"/>
      <path d="M546 250 H 566"/><path d="M634 250 H 654"/>
    </g>
    <circle cx="600" cy="250" r="7" fill="#ff9a3c"/>
    <text x="600" y="350" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" fill="#ff9a3c" opacity=".85">API</text>
  </g>
</svg>
