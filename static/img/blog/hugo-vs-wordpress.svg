<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="Static Hugo panel versus dynamic WordPress panel">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15110b"/>
      <stop offset="1" stop-color="#0b0b0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="2%" r="75%">
      <stop offset="0" stop-color="#ff7a18" stop-opacity=".20"/>
      <stop offset="55%" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a0c"/>
      <stop offset="1" stop-color="#140f0a"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      .pulse2{animation:pulse 3.2s ease-in-out infinite;animation-delay:1.1s}
      @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="500" fill="url(#bg)"/>
  <!-- faint brand columns -->
  <g fill="#ffffff" opacity="0.018">
    <rect x="70"  y="-20" width="120" height="540" rx="60"/>
    <rect x="320" y="-20" width="150" height="540" rx="75"/>
    <rect x="600" y="-20" width="120" height="540" rx="60"/>
    <rect x="860" y="-20" width="150" height="540" rx="75"/>
    <rect x="1110" y="-20" width="120" height="540" rx="60"/>
  </g>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- central motif: two contrasting CMS panels -->

  <!-- static Hugo panel (left, highlighted) -->
  <g>
    <rect x="300" y="138" width="248" height="224" rx="20" fill="url(#panel)" stroke="#ff7a18" stroke-opacity=".7" stroke-width="2.5"/>
    <rect x="300" y="138" width="248" height="224" rx="20" fill="none" stroke="#ff7a18" stroke-opacity=".25" stroke-width="10" filter="url(#soft)"/>
    <!-- lightning bolt = instant static delivery -->
    <path d="M438 178 L398 256 H430 L410 322 L470 238 H436 Z" fill="#ff9a3c"/>
    <g fill="#ffffff" opacity=".10">
      <rect x="330" y="300" width="120" height="11" rx="5.5"/>
      <rect x="330" y="322" width="170" height="11" rx="5.5"/>
    </g>
    <text x="424" y="354" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" fill="#ff9a3c" opacity=".85">Hugo (statisch)</text>
  </g>

  <!-- vs divider -->
  <text x="600" y="262" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="22" fill="#ffffff" opacity=".4">vs.</text>

  <!-- dynamic WordPress panel (right) -->
  <g>
    <rect x="652" y="138" width="248" height="224" rx="20" fill="#16161a" stroke="#ffffff" stroke-opacity=".16"/>
    <!-- gear stack = dynamic, database-driven -->
    <g transform="translate(742,212)" stroke="#ff9a3c" stroke-width="3" fill="none" opacity=".85">
      <circle r="24" class="pulse"/>
      <circle r="8" fill="#ff9a3c" stroke="none"/>
      <g stroke-linecap="round">
        <path d="M0 -34 V -26"/><path d="M0 34 V 26"/><path d="M-34 0 H -26"/><path d="M34 0 H 26"/>
        <path d="M-24 -24 L -18 -18"/><path d="M24 24 L 18 18"/><path d="M-24 24 L -18 18"/><path d="M24 -24 L 18 -18"/>
      </g>
    </g>
    <!-- small second gear -->
    <g transform="translate(806,256)" stroke="#ff9a3c" stroke-width="2.5" fill="none" opacity=".5">
      <circle r="14" class="pulse2"/>
      <circle r="5" fill="#ff9a3c" stroke="none"/>
    </g>
    <!-- database cylinder -->
    <g transform="translate(700,300)" fill="none" stroke="#ffffff" stroke-opacity=".22" stroke-width="2">
      <ellipse cx="0" cy="0" rx="22" ry="7"/>
      <path d="M-22 0 V 22 A22 7 0 0 0 22 22 V 0"/>
    </g>
    <text x="776" y="354" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" fill="#ffffff" opacity=".45">WordPress (dynamisch)</text>
  </g>

  <text x="600" y="438" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="17" fill="#ff9a3c" opacity=".85">Hugo vs. WordPress</text>
</svg>
