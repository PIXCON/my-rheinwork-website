<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-label="GA4 and server-side GTM">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15110b"/>
      <stop offset="1" stop-color="#0b0b0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="2%" r="75%">
      <stop offset="0" stop-color="#ff7a18" stop-opacity=".20"/>
      <stop offset="55%" stop-color="#ff7a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="server" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a0c"/>
      <stop offset="1" stop-color="#140f0a"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      .pulse2{animation:pulse 3.2s ease-in-out infinite;animation-delay:1.1s}
      @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="500" fill="url(#bg)"/>
  <!-- faint brand columns -->
  <g fill="#ffffff" opacity="0.018">
    <rect x="70"  y="-20" width="120" height="540" rx="60"/>
    <rect x="320" y="-20" width="150" height="540" rx="75"/>
    <rect x="600" y="-20" width="120" height="540" rx="60"/>
    <rect x="860" y="-20" width="150" height="540" rx="75"/>
    <rect x="1110" y="-20" width="120" height="540" rx="60"/>
  </g>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- connection paths -->
  <g fill="none" stroke="#ff7a18" stroke-opacity=".35" stroke-width="2.5">
    <path id="p0" d="M362 250 H512"/>
    <path id="p1" d="M690 250 H912"/>
  </g>
  <g fill="#ff9a3c">
    <circle r="5"><animateMotion dur="1.6s" repeatCount="indefinite"><mpath href="#p0"/></animateMotion></circle>
    <circle r="5"><animateMotion dur="1.8s" begin="0.6s" repeatCount="indefinite"><mpath href="#p1"/></animateMotion></circle>
  </g>

  <!-- web container (browser) -->
  <g>
    <rect x="112" y="172" width="250" height="156" rx="16" fill="#16161a" stroke="#ffffff" stroke-opacity=".14"/>
    <path d="M112 200 h250" stroke="#ffffff" stroke-opacity=".12" stroke-width="1.5"/>
    <circle cx="132" cy="186" r="4" fill="#ffffff" opacity=".25"/>
    <circle cx="148" cy="186" r="4" fill="#ffffff" opacity=".25"/>
    <circle cx="164" cy="186" r="4" fill="#ffffff" opacity=".25"/>
    <g fill="#ffffff" opacity=".10">
      <rect x="136" y="222" width="150" height="12" rx="6"/>
      <rect x="136" y="246" width="200" height="12" rx="6"/>
      <rect x="136" y="270" width="120" height="12" rx="6"/>
    </g>
    <rect x="136" y="296" width="110" height="16" rx="8" fill="#ff7a18" opacity=".55"/>
    <text x="237" y="350" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="17" fill="#ffffff" opacity=".4">Web-Container</text>
  </g>

  <!-- server-side GTM container with gear -->
  <g>
    <rect x="512" y="150" width="178" height="200" rx="20" fill="url(#server)" stroke="#ff7a18" stroke-opacity=".7" stroke-width="2.5"/>
    <rect x="512" y="150" width="178" height="200" rx="20" fill="none" stroke="#ff7a18" stroke-opacity=".25" stroke-width="10" filter="url(#soft)"/>
    <!-- gear (GTM processing) -->
    <g transform="translate(601,250)" stroke="#ff9a3c" stroke-width="3" fill="none">
      <circle r="26"/>
      <circle r="9" fill="#ff9a3c" stroke="none"/>
      <g stroke-linecap="round">
        <path d="M0 -38 V -28"/><path d="M0 38 V 28"/><path d="M-38 0 H -28"/><path d="M38 0 H 28"/>
        <path d="M-27 -27 L -20 -20"/><path d="M27 27 L 20 20"/><path d="M-27 27 L -20 20"/><path d="M27 -27 L 20 -20"/>
      </g>
    </g>
    <text x="601" y="334" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="16" fill="#ff9a3c" opacity=".85">Server-Side GTM</text>
  </g>

  <!-- GA4 (bar chart destination) -->
  <g>
    <rect x="912" y="172" width="176" height="156" rx="16" fill="#16161a" stroke="#ffffff" stroke-opacity=".16"/>
    <g stroke="#ff9a3c" stroke-width="14" stroke-linecap="round">
      <path class="pulse"  d="M952 296 V 256"/>
      <path class="pulse2" d="M1000 296 V 232"/>
      <path class="pulse"  d="M1048 296 V 212"/>
    </g>
    <text x="1000" y="350" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="17" fill="#ffffff" opacity=".4">GA4</text>
  </g>
</svg>
