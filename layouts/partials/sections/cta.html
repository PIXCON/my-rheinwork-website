<!-- CTA / Contact -->
<section class="section cta" id="contact">
  <div class="container">
    <div class="cta-grid">
      <div class="reveal">
        <span class="eyebrow">Contact Us</span>
        <h2 style="margin-top:20px;">Let's <span class="hl">Talk!</span></h2>
        <div class="cta-info">
          <a href="mailto:{{ site.Params.email }}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
            {{ site.Params.email }}
          </a>
          <a href="tel:{{ site.Params.phone }}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            {{ site.Params.phone }}
          </a>
          <span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            {{ site.Params.address }}
          </span>
        </div>
      </div>
      <form class="contact-form reveal" onsubmit="event.preventDefault(); this.reset(); alert('Thanks! We will be in touch.');">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@email.com" required>
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Tell us about your project..." required></textarea>
        </div>
        <button type="submit" class="btn btn--primary btn--block">Send Message</button>
      </form>
    </div>
  </div>
</section>
