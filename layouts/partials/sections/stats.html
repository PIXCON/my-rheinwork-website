<!-- Stats: warm panel orbs + cards + pills -->
<section class="section">
  <div class="container">
    <div class="stats-hero reveal">
      <div class="stats-orbs">
        {{ range site.Data.stats.counters }}
        <div class="stat-orb">
          <div class="num">{{ .value }}</div>
          <div class="lbl">{{ .label }}</div>
        </div>
        {{ end }}
      </div>
    </div>
    <div class="stats-cards reveal">
      {{ range site.Data.stats.points }}
      <div class="stat-card">
        <div class="stat-card-icon">{{ partial "icon.html" .icon }}</div>
        <h4>{{ .title }}</h4>
        <p>{{ .text }}</p>
      </div>
      {{ end }}
    </div>
    <div class="stats-pills reveal">
      {{ range site.Data.stats.pills }}
      <span class="stat-pill">{{ partial "icon.html" "spark" }} {{ . }}</span>
      {{ end }}
    </div>
  </div>
</section>
