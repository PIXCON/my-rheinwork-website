<!-- FAQ accordion -->
<section class="section">
  <div class="container">
    <div class="section-head reveal">
      <span class="eyebrow">{{ i18n "faqEyebrow" }}</span>
      <h2>{{ i18n "faqTitle" }}</h2>
    </div>
    <div class="faq-list">
      {{ range index site.Data.faq site.Language.Lang }}
      <div class="faq-item reveal">
        <button class="faq-q">
          {{ .q }}
          <span class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
          </span>
        </button>
        <div class="faq-a"><p>{{ .a }}</p></div>
      </div>
      {{ end }}
    </div>
  </div>
</section>
