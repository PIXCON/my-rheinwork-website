<!-- Industries marquee -->
<section class="section--tight">
  <div class="container section-head reveal" style="margin-bottom:32px;">
    <span class="eyebrow">{{ i18n "industriesEyebrow" }}</span>
    <h2 style="font-size:clamp(24px,3vw,32px)">{{ i18n "industriesTitle" }}</h2>
  </div>
  <div class="marquee-wrap">
    <div class="marquee">
      {{ $industries := split (i18n "industriesList") "," }}
      {{ range $industries }}<span>✶ {{ . }}</span>{{ end }}
      {{ range $industries }}<span>✶ {{ . }}</span>{{ end }}
    </div>
  </div>
</section>
