<header class="site-header">
  <div class="container nav">
    <a href="{{ "" | relLangURL }}" class="brand" aria-label="Rheinwork">
      <img src="{{ "img/rheinwork-logo.svg" | relURL }}" alt="Rheinwork" class="brand-logo" width="197" height="30">
    </a>
    <nav class="nav-menu" id="navMenu">
      <a href="{{ "" | relLangURL }}" class="nav-home" aria-label="{{ i18n "navHome" }}" title="{{ i18n "navHome" }}"{{ if .IsHome }} aria-current="page"{{ end }}>
        <svg class="nav-home-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.6V20h5v-6h4v6h5V9.6"/></svg>
        <span class="nav-home-text">{{ i18n "navHome" }}</span>
      </a>
      {{ range .Site.Menus.main }}
        {{ $active := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}
        <a href="{{ .URL }}"{{ if $active }} class="is-active" aria-current="page"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
    <div class="nav-actions">
      {{ partial "lang-switch.html" . }}
      <a href="{{ "contact/" | relLangURL }}" class="btn btn--primary">
        {{ i18n "getInTouch" }}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M13 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
</header>
