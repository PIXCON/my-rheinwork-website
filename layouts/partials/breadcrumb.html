<!-- Breadcrumb. Call with: (dict "items" (slice (dict "label" "Services" "url" "/services/") (dict "label" .Title))) -->
<nav class="breadcrumb" aria-label="Breadcrumb">
  <ol>
    <li><a href="/">Home</a></li>
    {{ range .items }}
    <li>
      {{ if .url }}<a href="{{ .url }}">{{ .label }}</a>{{ else }}<span aria-current="page">{{ .label }}</span>{{ end }}
    </li>
    {{ end }}
  </ol>
</nav>
