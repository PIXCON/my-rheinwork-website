<!-- Fixed background: down-pointing columns (to the hero text) + up-pointing columns interlocking from below -->
<div class="bg-decor" aria-hidden="true">
  <svg class="bg-pattern" preserveAspectRatio="xMidYMin slice" viewBox="0 0 1900 1000" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- top (down-pointing) columns: even brightness from the top, easing off near the rounded bottom -->
      <linearGradient id="colGradTop" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0"    stop-color="#ffffff" stop-opacity="0.040"/>
        <stop offset="0.60" stop-color="#ffffff" stop-opacity="0.040"/>
        <stop offset="0.88" stop-color="#ffffff" stop-opacity="0.033"/>
        <stop offset="1"    stop-color="#ffffff" stop-opacity="0.026"/>
      </linearGradient>
      <!-- bottom (up-pointing) columns: brightest at their rounded top, fading downward -->
      <linearGradient id="colGradBot" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0"    stop-color="#ffffff" stop-opacity="0.036"/>
        <stop offset="0.12" stop-color="#ffffff" stop-opacity="0.030"/>
        <stop offset="0.40" stop-color="#ffffff" stop-opacity="0"/>
        <stop offset="1"    stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>

      <!-- down-pointing column (rounded bottom) reaching to the hero text. tile 211 -> 9 columns -->
      <pattern id="colsTop" width="211" height="1000" patternUnits="userSpaceOnUse">
        <path d="M13 0 V258 A92 92 0 0 0 97 350 V0 Z"   fill="url(#colGradTop)"/>
        <path d="M197 0 V258 A92 92 0 0 1 113 350 V0 Z" fill="url(#colGradTop)"/>
      </pattern>
      <!-- up-pointing column (rounded top) coming from below, shifted half a tile to sit between two top columns -->
      <pattern id="colsBot" width="211" height="1000" patternUnits="userSpaceOnUse" x="105.5">
        <path d="M13 1000 V432 A92 92 0 0 1 97 340 V1000 Z"   fill="url(#colGradBot)"/>
        <path d="M197 1000 V432 A92 92 0 0 0 113 340 V1000 Z" fill="url(#colGradBot)"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#colsTop)"/>
    <rect width="100%" height="100%" fill="url(#colsBot)"/>
  </svg>
  <span class="bg-fade"></span>
</div>
