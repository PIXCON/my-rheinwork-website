name = "rheinwork-contact"
main = "contact-worker.js"
compatibility_date = "2024-11-01"

# Diese Werte anpassen:
[vars]
# Absender-Adresse: muss in Postmark als verifizierter Sender / verifizierte Domain (SPF + DKIM) bestätigt sein.
FROM_EMAIL = "kontakt@rheinwork.com"
# Empfänger: wohin die Anfragen gehen.
TO_EMAIL = "info@rheinwork.com"
# Erlaubte Origins (CORS), kommagetrennt. Produktionsdomain + lokale Vorschau.
ALLOWED_ORIGINS = "https://pixcon.github.io,http://localhost:1313"

# POSTMARK_TOKEN wird NICHT hier eingetragen, sondern als Secret gesetzt:
#   wrangler secret put POSTMARK_TOKEN
